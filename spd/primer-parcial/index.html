// --- State ---
let questions = [];
let current = 0;
let score = 0;
let selected = [];
let answered = false;

// --- Shuffle helper ---
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function prepareQuestions() {
  questions = shuffle(ALL_QUESTIONS).map(q => {
    // shuffle options but track which are correct
    const indexed = q.opts.map((o, i) => ({ text: o, isCorrect: q.correct.includes(i) }));
    const shuffled = shuffle(indexed);
    return {
      q: q.q,
      opts: shuffled.map(o => o.text),
      correct: shuffled.map((o, i) => o.isCorrect ? i : -1).filter(i => i !== -1),
      multi: q.correct.length > 1
    };
  });
}

function startQuiz() {
  prepareQuestions();
  current = 0;
  score = 0;
  selected = [];
  answered = false;

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';

  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  selected = [];
  answered = false;

  document.getElementById('question-number').textContent = `Pregunta ${current + 1}`;
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('q-counter').textContent = `Pregunta ${current + 1} de ${questions.length}`;
  document.getElementById('q-score-live').textContent = `Puntaje: ${score}`;

  const hint = document.getElementById('multi-hint');
  hint.style.display = q.multi ? 'block' : 'none';

  const fb = document.getElementById('feedback-box');
  fb.style.display = 'none';
  fb.className = '';

  const btnCheck = document.getElementById('btn-check');
  const btnNext = document.getElementById('btn-next');
  btnCheck.style.display = 'inline-block';
  btnCheck.disabled = true;
  btnNext.style.display = 'none';

  const pct = (current / questions.length) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';

  const list = document.getElementById('options-list');
  list.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.dataset.idx = i;
    btn.innerHTML = `<span class="option-indicator">${String.fromCharCode(65 + i)}</span><span>${opt}</span>`;
    btn.addEventListener('click', () => toggleOption(i));
    list.appendChild(btn);
  });
}

function toggleOption(idx) {
  if (answered) return;
  const q = questions[current];
  const btn = document.querySelector(`.option-btn[data-idx="${idx}"]`);

  if (q.multi) {
    // multi-select toggle
    if (selected.includes(idx)) {
      selected = selected.filter(i => i !== idx);
      btn.classList.remove('selected');
    } else {
      selected.push(idx);
      btn.classList.add('selected');
    }
  } else {
    // single-select: deselect others
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    selected = [idx];
    btn.classList.add('selected');
  }

  document.getElementById('btn-check').disabled = selected.length === 0;
}

function checkAnswer() {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const correctSet = new Set(q.correct);
  const selectedSet = new Set(selected);

  // Check if fully correct
  const isCorrect =
    q.correct.every(i => selectedSet.has(i)) &&
    selected.every(i => correctSet.has(i));

  if (isCorrect) score++;

  // Color the buttons
  document.querySelectorAll('.option-btn').forEach(btn => {
    const idx = parseInt(btn.dataset.idx);
    btn.disabled = true;
    if (correctSet.has(idx) && selectedSet.has(idx)) {
      btn.classList.remove('selected');
      btn.classList.add('correct');
    } else if (!correctSet.has(idx) && selectedSet.has(idx)) {
      btn.classList.remove('selected');
      btn.classList.add('wrong');
    } else if (correctSet.has(idx) && !selectedSet.has(idx)) {
      btn.classList.add('missed');
    }
  });

  // Feedback
  const fb = document.getElementById('feedback-box');
  fb.style.display = 'block';
  if (isCorrect) {
    fb.className = 'ok';
    fb.textContent = '✓ ¡Correcto!';
  } else {
    fb.className = 'fail';
    const correctLabels = q.correct.map(i => String.fromCharCode(65 + i)).join(', ');
    fb.textContent = `✗ Incorrecto. La${q.correct.length > 1 ? 's' : ''} respuesta${q.correct.length > 1 ? 's' : ''} correcta${q.correct.length > 1 ? 's' : ''}: ${correctLabels}`;
  }

  document.getElementById('btn-check').style.display = 'none';
  document.getElementById('btn-next').style.display = 'inline-block';
  document.getElementById('q-score-live').textContent = `Puntaje: ${score}`;
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'block';

  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('score-number').textContent = score;
  document.getElementById('score-total').textContent = `de ${questions.length}`;

  let label, color;
  if (pct >= 80) {
    label = '¡Excelente! 🎉';
    color = '#28a745';
  } else if (pct >= 60) {
    label = 'Bien, seguí repasando 💪';
    color = '#e07000';
  } else {
    label = 'A repasar más 📚';
    color = '#dc3545';
  }

  document.getElementById('score-circle').style.borderColor = color;
  document.getElementById('score-number').style.color = color;
  document.getElementById('score-label').textContent = label;
  document.getElementById('score-pct').textContent = `${pct}% de respuestas correctas`;
  document.getElementById('progress-bar').style.width = '100%';
}
</script>
